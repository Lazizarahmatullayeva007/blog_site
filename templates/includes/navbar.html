<nav class="navbar">

    <div class="nav-container">

        <!-- Logo -->
        <a href="/" class="logo">

            <div class="logo-circle">
                ✦
            </div>

            <div class="logo-text">

                <span class="logo-title">
                    INFO BLOG
                </span>

                <span class="logo-subtitle">
                    Technology News
                </span>

            </div>

        </a>


        <!-- Right -->
        <div class="nav-right">

                <form
                    class="search-box"
                    action="{% url 'blogapp:post_search' %}"
                    method="get">

                    <svg class="search-icon"
                         xmlns="http://www.w3.org/2000/svg"
                         width="18"
                         height="18"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"/>

                    </svg>

    <input
        type="text"
        name="query"
        placeholder="Search articles..."
        value="{{ request.GET.query }}">

</form>

            {% if user.is_authenticated %}

                <div class="user-box">

                    <div class="avatar">

                        {{ user.username|first|upper }}

                    </div>

                    <span>

                        {{ user.username }}

                    </span>

                </div>

                <form method="post"
                      action="{% url 'logout' %}">

                    {% csrf_token %}

                    <button class="btn btn-outline">

                        Logout

                    </button>

                </form>

            {% else %}

                <a href="{% url 'login' %}"
                   class="btn btn-outline">

                    Login

                </a>

                <a href="{% url 'blogapp:register' %}"
                   class="btn btn-primary">

                    Register

                </a>

            {% endif %}

        </div>

    </div>

</nav>
